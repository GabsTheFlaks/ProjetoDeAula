<svg width="400" height="300" viewBox="0 0 400 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Julius Tutor Logo</title>
  <desc>Logo do projeto Julius Tutor: janela de terminal com chapéu de formatura e texto em estilo linha de comando.</desc>

  <rect x="0" y="0" width="400" height="300" rx="10" fill="#0D1117"/>
  <rect x="0" y="0" width="400" height="36" rx="10" fill="#1C2128"/>
  <rect x="0" y="18" width="400" height="18" fill="#1C2128"/>

  <circle cx="28" cy="18" r="7" fill="#FF5F57"/>
  <circle cx="52" cy="18" r="7" fill="#FFBD2E"/>
  <circle cx="76" cy="18" r="7" fill="#28CA41"/>
  <text x="200" y="23" text-anchor="middle" fill="#8B949E" font-family="'Courier New', Courier, monospace" font-size="12">julius_tutor — bash</text>

  <text x="30" y="85" fill="#58A6FF" font-family="'Courier New', Courier, monospace" font-size="17">julius@tutor:~$</text>

  <!-- Graduation cap -->
  <polygon points="150,118 200,103 250,118 200,133" fill="#58A6FF"/>
  <rect x="184" y="130" width="32" height="18" rx="3" fill="#3A7BD5"/>
  <line x1="250" y1="118" x2="250" y2="145" stroke="#58A6FF" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="242" y="144" width="16" height="5" rx="2" fill="#58A6FF"/>
  <line x1="244" y1="149" x2="243" y2="158" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="149" x2="250" y2="160" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="256" y1="149" x2="257" y2="158" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="103" r="3.5" fill="#E6EDF3"/>

  <!-- Main title -->
  <text x="30" y="200" fill="#E6EDF3" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="bold">Julius Tutor</text>
  <rect x="339" y="176" width="13" height="28" rx="1" fill="#58A6FF" opacity="0.85"/>

  <text x="30" y="228" fill="#8B949E" font-family="'Courier New', Courier, monospace" font-size="13">// ensino de C++ para iniciantes</text>

  <!-- Badges -->
  <rect x="30" y="248" width="65" height="26" rx="4" fill="#00599C"/>
  <text x="62" y="265" text-anchor="middle" fill="#FFFFFF" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold">C++</text>

  <rect x="105" y="248" width="80" height="26" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="145" y="265" text-anchor="middle" fill="#8B949E" font-family="'Courier New', Courier, monospace" font-size="12">terminal</text>

  <rect x="195" y="248" width="105" height="26" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="247" y="265" text-anchor="middle" fill="#8B949E" font-family="'Courier New', Courier, monospace" font-size="12">iniciantes</text>

  <text x="200" y="290" text-anchor="middle" fill="#8B949E" font-family="'Courier New', Courier, monospace" font-size="10">feito com coração para escolas públicas</text>
</svg>
